<!DOCTYPE html>
<html>
  <head>
    <title>🚀 Starbase API Documentation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      @import url(//fonts.googleapis.com/css?family=Roboto:400,700);

      body {
          margin: 0;
          padding: 0;
          font-family: Verdana, Geneva, sans-serif;
      }

      .redoc-wrap > div:last-child:not([id^="section"]):not(.redoc-markdown) {
          background-color: #060B2C !important;
      }

      .api-content > div > div:last-child > div:not(.api-info):not(:has(> h2)):not([id^="section"]):not(.redoc-markdown):last-child {
          background-color: #060B2C !important;
      }

      .react-tabs__tab-panel > div:not(.redoc-markdown) {
          background-color: #141B40 !important;
          border: 1px solid #1E2654 !important;
          border-radius: 5px !important;
      }

      /* Override styles for elements inside divs with IDs starting with "section" */
      [id^="section"] .redoc-wrap > div:last-child,
      [id^="section"] .api-content > div > div:last-child > div:not(.api-info):not(:has(> h2)):last-child,
      [id^="section"] .react-tabs__tab-panel > div,
      .redoc-markdown {
          background-color: transparent !important;
          border-color: transparent !important;
      }

      .react-tabs__tab {
            background-color: #060B2C !important;
            border: 1px solid #1E2654 !important;
            border-radius: 5px !important;
      }

      .react-tabs__tab--selected {
          background-color: white !important;
      }

      h2 {
          font-weight: 600 !important;
      }

      h1 {
          font-size: 2rem !important;
          font-weight: 800 !important;
          line-height: 2.5rem !important;
      }


    </style>
    <link rel="icon" type="image/png" href="/favicon.ico">
    <link rel="apple-touch-icon-precomposed" href="/favicon.ico">
  </head>
  <body>
    <div id="redoc_container"></div>
    <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"> </script>
    <script>
      Redoc.init(
        "api-docs/openapi.json", {
          "showConsole": true,
          "pathInMiddlePanel": true,
          "redocExport": "RedocPro",
          "layout": { "scope": "section" },
          "unstable_externalDescription": 'https://games.bisecthosting.com/docs/info',
          "hideDownloadButton" : 1
        },
        document.getElementById("redoc_container")
      );

      var constantMock = window.fetch;
      window.fetch = function() {

        if (/\/api/.test(arguments[0]) && !arguments[1].headers.Accept) {
          arguments[1].headers.Accept = 'application/json';
        }

        return constantMock.apply(this, arguments)
      }
    </script>
